<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="https://img.icons8.com/sf-regular/180/calendar.png">
<link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/sf-regular/192/calendar.png">
<meta name="apple-mobile-web-app-title" content="班表Pro">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>班表系統 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f14;--surface:#16161e;--surface2:#1c1c26;--border:#252535;
    --accent:#f5c842;--red:#e05c5c;--green:#5cbf8a;--blue:#5c9ee0;
    --purple:#a07adb;--text:#e8e8f0;--text-muted:#7a7a9a;--text-dim:#4a4a6a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh; overflow-x: hidden;}
  .header{background:rgba(22, 22, 30, 0.95); backdrop-filter: blur(10px); border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:1000;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .month-label{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);}
  .sub-label{font-size:12px;color:var(--text-muted);margin-left:8px;}
  .refresh-btn{background:var(--surface); border:1px solid var(--border); border-radius:8px;color:var(--text-muted); font-size:12px; padding:6px 12px; cursor:pointer; transition: all 0.2s;}
  .refresh-btn:active{transform: scale(0.95); opacity: 0.7;}
  .month-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;margin:0 -16px;padding:0 16px;}
  .month-tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:8px 16px;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;border-bottom: 2px solid transparent; white-space: nowrap;}
  .tab.active{color:var(--accent); border-bottom-color:var(--accent);}
  .content{padding:12px 0 80px; transition: opacity 0.3s;}
  .group{margin:0 12px 18px; border-radius:14px; overflow:visible; border:1px solid var(--border); background:var(--surface); animation:fadeUp 0.4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .group-head{display:flex;align-items:center;justify-content: space-between;padding:11px 14px;background:rgba(28, 28, 38, 0.95); backdrop-filter: blur(8px);border-bottom:1px solid var(--border);position: sticky;top: 96px; z-index: 500;border-top-left-radius: 14px;border-top-right-radius: 14px;}
  .gbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;font-family:'DM Mono',monospace;}
  .bt{background:rgba(92,158,224,.15);color:var(--blue); border:1px solid rgba(92,158,224,0.3);}
  .btc{background:rgba(160,122,219,.15);color:var(--purple); border:1px solid rgba(160,122,219,0.3);}
  .gname{font-size:13px; color:var(--text-muted); font-weight: 300; text-align: right;}
  .ecard{border-bottom:1px solid var(--border);padding:12px 14px; background: var(--surface);}
  .ecard:last-child{border-bottom:none; border-bottom-left-radius: 14px; border-bottom-right-radius: 14px;}
  .einfo{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .ename{font-size:15px;font-weight:500; color: var(--text);}
  .ehours{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:'DM Mono',monospace; letter-spacing: 0.5px;}
  .offc{font-size:11px;color:var(--text-dim); text-align: right;}
  .offc b{color:var(--red);font-size:13px; font-weight: 500;}
  .loading-overlay {position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.3s;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px; margin-top: 4px;}
  .cwd{text-align:center;font-size:9px;color:var(--text-dim);padding:2px 0 6px;font-family:'DM Mono',monospace;}
  .cd{border-radius:8px;padding:5px 2px;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;position: relative; transition: all 0.2s;}
  .cd.has-date { background:rgba(255,255,255,.02); }
  .cd.selected{background: rgba(245, 200, 66, 0.1); box-shadow: inset 0 0 0 1px rgba(245, 200, 66, 0.3);}
  .cd.today{box-shadow:inset 0 0 0 1.5px var(--accent);}
  .dn{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim); line-height: 1; margin-bottom: 4px;}
  .cd.today .dn{color:var(--accent); font-weight: 700;}
  .cd.selected .dn { color: var(--accent); }
  .sb{font-size:11px;font-weight:600; text-align:center; line-height: 1.3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;}
  .time-tag{color:var(--green); font-size: 9px; font-weight: 700; letter-spacing: 0.2px;}
  .memo-tag{color:var(--text-muted); font-size: 8px; letter-spacing: 0.5px;}
  .dot{color:transparent; font-size: 10px;}
  .upd-footer{text-align:center;font-size:10px;color:var(--text-dim);padding:20px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div style="margin-top:15px; font-size: 14px;">讀取班表…</div>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <span class="month-label" id="mLabel">請選擇分頁</span>
      <span class="sub-label">班表</span>
    </div>
    <button class="refresh-btn" onclick="refreshCurrent()">↻ 更新</button>
  </div>
  <div class="month-tabs" id="monthTabs"></div>
</div>

<div class="content" id="content"></div>
<div class="upd-footer" id="updFooter"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxD2igshVAwOHOBhBGkdDRsk1FAvSKOMKzK56XD14avXTaiy6DqGo_cjI1vu_R0Qn_X/exec';
const GROUPS = {
  taichung: { label:'台中', cls:'btc', names:['羿安','怡君','舒喬','Nana','Ines'] },
  taipei:   { label:'台北', cls:'bt',  names:['Yuki','Maru','恒怡','涵涵'] }
};
const PART_TIME = ['羿安', '怡君'];
const WD = ['一','二','三','四','五','六','日'];

let currentGid = null;
let allSheets = [];
let currentData = null; 
let selectedDay = null; 

function init() {
  fetchSheets();
}

function fetchSheets() {
  jsonp({}, (result) => {
    if (result.sheets) {
      allSheets = result.sheets;
      buildTabs(); 
    }
  });
}

function buildTabs() {
  const container = document.getElementById('monthTabs');
  container.innerHTML = '';
  const now = new Date();
  const nowLabel = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}`;
  
  let defaultIdx = allSheets.findIndex(s => s.name === nowLabel);
  if (defaultIdx < 0) defaultIdx = allSheets.length - 1;

  allSheets.forEach((sheet, i) => {
    const tab = document.createElement('div');
    const isThisActive = (currentGid ? sheet.gid == currentGid : i === defaultIdx);
    tab.className = 'tab' + (isThisActive ? ' active' : '');
    tab.textContent = sheet.name;
    tab.onclick = () => { selectedDay = null; switchTab(sheet.gid, tab); };
    container.appendChild(tab);
    if (isThisActive && !currentGid) { 
      currentGid = sheet.gid; 
      switchTab(sheet.gid, tab); 
    }
  });
}

function switchTab(gid, tabEl) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  tabEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  currentGid = gid;
  loadSheet(gid);
}

function loadSheet(gid) {
  showLoading();
  jsonp({ gid }, (result) => {
    currentData = result; 
    render(result);
    hideLoading();
  }, (err) => { hideLoading(); console.error(err); });
}

function refreshCurrent() { if (currentGid) loadSheet(currentGid); }

function jsonp(params, onSuccess, onError) {
  const cbName = '__gs_' + Date.now() + Math.floor(Math.random()*1000);
  window[cbName] = (data) => { delete window[cbName]; onSuccess(data); };
  const qs = Object.entries({...params, callback: cbName, t: Date.now()}).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  const s = document.createElement('script');
  s.src = `${SCRIPT_URL}?${qs}`;
  s.onerror = () => onError('網路連線異常');
  document.head.appendChild(s);
}

function render(result) {
  const rows = result.data;
  const [y, mo] = result.currentSheetName.split('.').map(Number);
  
  const total = new Date(y, mo, 0).getDate();
  let sw = new Date(y, mo - 1, 1).getDay();
  sw = sw === 0 ? 6 : sw - 1;
  const dc = findDayCol(rows);
  if (!dc) return;
  const map = buildMap(rows, dc.c, total);

  document.getElementById('mLabel').textContent = `${y} / ${String(mo).padStart(2,'0')}`;
  
  const now = new Date();
  const isCurrentMonth = (now.getFullYear() === y && now.getMonth() + 1 === mo);
  const today = isCurrentMonth ? now.getDate() : -1;
  const targetDay = selectedDay || (today !== -1 ? today : 1);

  let html = '';
  for (const g of Object.values(GROUPS)) {
    let cards = '';
    let workOnTarget = 0;
    for (const name of g.names) {
      const key = Object.keys(map).find(k => k === name || k.includes(name));
      const emp = key ? map[key] : null;
      let offDays = 0, ptHours = 0;

      if (emp) {
        for (let d = 1; d <= total; d++) {
          const s = emp.sh[d];
          const isOff = (s === '休' || s.includes('年'));
          if (isOff) {
            offDays++;
          } else {
            if (PART_TIME.includes(name)) ptHours += calcPtHours(s);
            // 邏輯校正：只要非休假且是目前選擇的日期，就計入上班人數[cite: 1]
            if (d === targetDay) workOnTarget++;
          }
        }
      }
      
      const calHtml = generateCalendar(sw, total, today, targetDay, emp);
      let showHours = '';
      if (emp && emp.hr) {
        const hr = emp.hr.trim();
        if (hr && hr !== '11:00 – 20:00' && hr !== 'POS' && hr !== '外') showHours = hr;
      }

      const statLabel = PART_TIME.includes(name) 
        ? `休 <b>${offDays}</b> 天 · <b style="color:#7db8e8">${ptHours}</b> 小時`
        : `休 <b>${offDays}</b> 天`;

      cards += `<div class="ecard"><div class="einfo"><div><div class="ename">${name}</div>${showHours ? `<div class="ehours">${showHours}</div>` : ''}</div><div class="offc">${statLabel}</div></div><div class="cal">${calHtml}</div></div>`;
    }
    const labelText = `${mo} / ${targetDay}`;
    // 修正點：使用 &nbsp;&nbsp;&nbsp;&nbsp; 加大日期與上班人數之間的間距[cite: 1]
    html += `
      <div class="group">
        <div class="group-head">
          <span class="gbadge ${g.cls}">${g.label}</span>
          <span class="gname">
            <span style="color:#fff">${labelText}</span>&nbsp;&nbsp;&nbsp;&nbsp;
            <b style="color:var(--accent)">${workOnTarget}</b> 人上班
          </span>
        </div>
        ${cards}
      </div>`;
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('updFooter').textContent = `最後更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function calcPtHours(s) {
  // 兼職工時邏輯：空白計 8 小時，有時間格式則計算後減 1[cite: 1]
  if (!s || s.trim() === "") return 8; 
  const m = s.match(/(\d{1,2})[-:](\d{1,2})/);
  if (m) {
    const parts = s.split(/[-:]/);
    const start = parseInt(parts[0]);
    const end = parseInt(parts[1]);
    let diff = end - start;
    if (diff < 0) diff += 24;
    return diff > 4 ? diff - 1 : diff;
  }
  return 8; 
}

function generateCalendar(sw, total, today, targetDay, emp) {
  let h = WD.map(w => `<div class="cwd">${w}</div>`).join('');
  for (let e=0; e<sw; e++) h += `<div class="cd empty"></div>`;
  for (let d=1; d<=total; d++) {
    const isToday = d === today;
    const isSelected = d === targetDay;
    const shift = emp ? emp.sh[d] : '';
    h += `<div class="cd has-date ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDate(${d})"><div class="dn">${d}</div>${renderShift(shift)}</div>`;
  }
  return h;
}

function renderShift(v) {
  if (!v || v.trim() === "") return `<span class="dot">·</span>`;
  const t = v.trim();
  if (t === '休') return `<span class="sb" style="color:var(--red)">休</span>`;
  if (t.includes('年')) return `<span class="sb" style="color:#e8854a">年</span>`;
  const m = t.match(/(\d{1,2})[-:](\d{1,2})/);
  if (m) return `<div class="sb"><span class="time-tag">${m[1]}:${m[2]}</span></div>`;
  return `<span class="sb memo-tag">${t}</span>`;
}

function selectDate(day) { selectedDay = day; render(currentData); }
function findDayCol(rows) {
  for (let r=0; r<10; r++)
    for (let c=0; c<rows[r].length; c++)
      if (String(rows[r][c]).trim()==='1' && String(rows[r][c+1]).trim()==='2') return {r, c};
  return null;
}
function buildMap(rows, fc, total) {
  const map = {};
  rows.forEach(row => {
    const nm = String(row[2]||'').trim();
    if (!nm || nm.length > 10 || /^\d+$/.test(nm)) return;
    const sh = {};
    for (let d=1; d<=total; d++) sh[d] = String(row[fc+d-1]||'').trim();
    map[nm] = { hr: String(row[3]||'').trim(), sh };
  });
  return map;
}
function showLoading() { document.getElementById('loadingOverlay').style.opacity = '1'; document.getElementById('loadingOverlay').style.pointerEvents = 'all'; }
function hideLoading() { document.getElementById('loadingOverlay').style.opacity = '0'; document.getElementById('loadingOverlay').style.pointerEvents = 'none'; }

init();
</script>
</body>
</html>
